<?xml version="1.0" encoding="UTF-8"?>
<!--
  Apple "Download on the App Store" badge — English (US/CA identical).
  Reproduces Apple's standard small-size badge artwork per
  https://developer.apple.com/app-store/marketing/guidelines/

  Canonical viewBox 119.664 x 40. Apple logo rendered as path; the two
  text lines use the Apple system font stack so they render in SF Pro on
  Apple devices and in the native system sans elsewhere. Black variant
  for use on light backgrounds.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 119.664 40" role="img" aria-label="Download on the App Store">
  <title>Download on the App Store</title>
  <rect x="0.5" y="0.5" width="118.664" height="39" rx="6" ry="6" fill="#000" stroke="#A6A6A6"/>
  <!-- Apple logo -->
  <g fill="#fff">
    <path d="M22.092 20.302c-.014-1.567 1.281-2.33 1.34-2.366-.733-1.072-1.873-1.219-2.281-1.236-.971-.099-1.895.572-2.387.572-.493 0-1.252-.557-2.06-.541-1.058.016-2.034.616-2.579 1.564-1.1 1.907-.281 4.728.793 6.276.523.757 1.146 1.61 1.962 1.58.789-.032 1.087-.512 2.04-.512.953 0 1.222.512 2.054.495.849-.014 1.388-.773 1.907-1.534.6-.882.847-1.736.86-1.78-.019-.008-1.65-.633-1.665-2.518Zm-1.572-4.625c.435-.526.728-1.257.648-1.984-.626.025-1.385.418-1.834.945-.402.466-.755 1.21-.66 1.924.701.054 1.412-.357 1.846-.885Z"/>
  </g>
  <!-- Text — uses Apple system font stack -->
  <g fill="#fff" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif">
    <text x="33" y="16.5" font-size="7.2" font-weight="400" letter-spacing="0.2">Download on the</text>
    <text x="33" y="30.5" font-size="16.5" font-weight="500" letter-spacing="-0.3">App Store</text>
  </g>
</svg>
